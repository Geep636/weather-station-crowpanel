name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run

      - name: Install esptool
        run: pip install esptool

      - name: Merge firmware binaries
        run: |
          python -m esptool --chip esp32s3 merge_bin \
            --output firmware_merged.bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 8MB \
            0x0 .pio/build/esp32-s3/bootloader.bin \
            0x8000 .pio/build/esp32-s3/partitions.bin \
            0x10000 .pio/build/esp32-s3/firmware.bin

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Copy firmware to docs for GitHub Pages
        run: cp firmware_merged.bin docs/firmware_merged.bin

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Weather Crow ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Weather Crow Firmware ${{ steps.get_version.outputs.VERSION }}

            ### Installation

            **Web Installer (Recommended):**
            Visit [Weather Crow Web Installer](https://kotamorishi.github.io/weather-crow5.7/) to flash directly from your browser.

            **Manual Installation:**
            Download `firmware_merged.bin` and flash with esptool:
            ```bash
            esptool.py --chip esp32s3 write_flash 0x0 firmware_merged.bin
            ```

            ### First Boot
            1. Device creates WiFi hotspot: **WeatherCrow-Config**
            2. Connect and go to **192.168.4.1**
            3. Enter WiFi credentials and OpenWeatherMap API key
          files: |
            firmware_merged.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
