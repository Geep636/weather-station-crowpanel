; PlatformIO configuration for Weather Crow ESP32-S3
; Build: pio run
; Upload: pio run --target upload
; Serial Monitor: pio device monitor

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor baud rate (matches your code)
monitor_speed = 115200

; Build flags
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0

; Libraries
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17

; Upload settings (lowered speed for stability)
upload_speed = 460800

; Partition scheme for larger apps (optional, uncomment if needed)
; board_build.partitions = huge_app.csv
